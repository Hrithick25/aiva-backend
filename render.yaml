services:
  - type: web
    name: aiva-backend
    runtime: python
    buildCommand: |
      pip install -r requirements.txt && python -m rag_faiss.build_index
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: PORT
        value: "10000"
